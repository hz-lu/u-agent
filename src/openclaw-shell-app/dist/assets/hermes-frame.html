<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hermes</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: #0b1326; }
    .bar { height: 44px; display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 0 12px; background: #111827; color: #e5e7eb; border-bottom: 1px solid #263244; box-sizing: border-box; }
    .title { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; color: #cbd5e1; }
    .actions { display: flex; gap: 8px; }
    button { height: 30px; border: 1px solid #334155; border-radius: 8px; background: #1f2937; color: #e5e7eb; padding: 0 10px; cursor: pointer; }
    button:hover { background: #263449; }
    iframe { display: block; width: 100%; height: calc(100% - 44px); border: 0; background: #fff; }
  </style>
</head>
<body>
  <div class="bar">
    <div class="title" id="title">Hermes</div>
    <div class="actions">
      <button id="back">后退</button>
      <button id="reload">刷新</button>
    </div>
  </div>
  <iframe id="frame" sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts allow-downloads"></iframe>
  <script>
    const params = new URLSearchParams(location.search);
    const target = params.get("target") || "http://127.0.0.1:17520";
    const frame = document.getElementById("frame");
    document.getElementById("title").textContent = target;
    frame.src = target;
    document.getElementById("reload").onclick = () => frame.contentWindow ? frame.contentWindow.location.reload() : frame.src = target;
    document.getElementById("back").onclick = () => {
      try { frame.contentWindow.history.back(); } catch { frame.src = target; }
    };
  </script>
</body>
</html>
